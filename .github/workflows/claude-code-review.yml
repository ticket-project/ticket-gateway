name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
  pull_request:
    branches: [ "master", "develop" ]
    types: [ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            먼저 아래 문서를 순서대로 읽어 ticket-gateway 저장소의 리뷰 규칙과 도메인 맥락을 숙지하세요.
            1. AGENTS.md
            2. README.md
            3. .github/copilot-instructions.md
            4. .github/instructions/code-review.instructions.md
            5. .github/instructions/java-review.instructions.md

            그 다음 공식 code-review 플러그인을 실행합니다.
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || inputs.pr_number }}

            ## 리뷰 작성 규칙
            - 모든 출력은 한국어로 작성합니다.
            - 패치만 보지 말고 주변 코드, 관련 테스트, 설정, 라우팅 구성을 함께 확인합니다.
            - 라우팅 순서, CORS, 운영 URI, actuator 노출, 헤더 전달, 내부 인증 토큰 전파를 우선 확인합니다.
            - 잘못된 배포 트리거, secret 노출, 권한 과다 부여, 운영 장애 가능성을 우선 확인합니다.
            - 심각도 순서(CRITICAL -> HIGH -> MEDIUM -> LOW)로 정리합니다.
            - 확신이 없는 지적은 "불확실"로 표시합니다.
            - 요청 범위를 벗어난 리팩터링이나 기능 추가는 제안하지 않습니다.
