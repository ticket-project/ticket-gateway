server:
  port: ${GATEWAY_PORT:8000}
  forward-headers-strategy: framework

spring:
  application:
    name: ticket-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

security:
  jwt:
    issuer: ${JWT_ISSUER:ticket}
    secret-key: ${JWT_SECRET:0123456789abcdef0123456789abcdef}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
  internal-auth:
    issuer: ${INTERNAL_AUTH_ISSUER:ticket-gateway}
    secret-key: ${INTERNAL_AUTH_SECRET_KEY:abcdefabcdefabcdefabcdefabcdef12}
    expiration-seconds: ${INTERNAL_AUTH_EXPIRATION_SECONDS:60}
    core-audience: ${INTERNAL_AUTH_CORE_AUDIENCE:ticket-core}
    queue-audience: ${INTERNAL_AUTH_QUEUE_AUDIENCE:ticket-queue}

ticket:
  gateway:
    ticket-api-uri: ${TICKET_API_URI:http://localhost:8080}
    ticket-websocket-uri: ${TICKET_API_WS_URI:http://localhost:8080}
    queue-uri: ${TICKET_QUEUE_URI:http://localhost:8090}
    cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
